version: '3.8'

services:
  # --- Gateway Layer ---
  api-gateway:
    build: ./gateway/api-gateway
    ports:
      - "3000:3000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      - auth-service
    networks:
      - irms-network

  auth-service:
    build: ./gateway/auth-service
    ports:
      - "3001:3001"
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/irms_auth
    depends_on:
      - postgres-db
    networks:
      - irms-network

  # --- Core Domain Services (Java/Spring Boot) ---
  order-service:
    build: ./services/order-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/irms_order
      - SPRING_REDIS_HOST=redis-cache
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres-db
      - redis-cache
      - rabbitmq
    networks:
      - irms-network

  menu-service:
    build: ./services/menu-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/irms_menu
    depends_on:
      - postgres-db
    networks:
      - irms-network

  kitchen-service:
    build: ./services/kitchen-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/irms_kitchen
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres-db
      - rabbitmq
    networks:
      - irms-network

  # --- Support Services ---
  notification-service:
    build: ./services/notification-service
    ports:
      - "3002:3002"
      - "3003:3003" # WebSocket
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - irms-network

  reporting-service:
    build: ./services/reporting-service
    ports:
      - "5000:5000"
    environment:
      - DB_URL=postgresql://irms_user:irms_pass@postgres-db:5432/irms_order
    depends_on:
      - postgres-db
    networks:
      - irms-network

  # --- Data Layer ---
  postgres-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=irms_user
      - POSTGRES_PASSWORD=irms_pass
      - POSTGRES_MULTIPLE_DATABASES=irms_auth,irms_order,irms_menu,irms_kitchen,irms_table,irms_inventory,irms_payment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # In a real setup, we'd add an initialization script to create multiple DBs
      - ./infrastructure/docker/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - irms-network

  redis-cache:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - irms-network

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - irms-network

networks:
  irms-network:
    driver: bridge

volumes:
  postgres_data:
